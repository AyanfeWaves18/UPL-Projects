<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook - Log in or Sign up</title>
  <link rel="icon" type="image/png" href="Facebook Icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <a href="#" class="logo">
      <img src="Facebook Icon.png" alt="Facebook">
    </a>
  </div>
  <div class="page">
    <div class="container">
      <div class="hero">
        <h1>Facebook</h1>
        <p>Explore the things you love.</p>
        
        <div class="visuals">
          <img src="fb image 1.webp" alt="Family" class="visual-item image-1">
          <img src="fb image 2.webp" alt="Car" class="visual-item image-2">
          <img src="fb image 3.webp" alt="Landscape" class="visual-item image-3">
        </div>
      </div>

      <div class="card">
        <div class="card-title">Log in to Facebook</div>
        
        <form>
          <input type="text" placeholder="Email address or mobile number" autofocus>
          <input type="password" placeholder="Password">
          <button class="primary" type="submit">Log In</button>
        </form>

        <div class="links">
          <a href="#">Forgotten password?</a>
        </div>

        <div class="divider"><span>or</span></div>

        <button class="secondary" type="button">Create new account</button>

        <p class="note"><a href="#" class="create-page"><strong>Create a Page</strong></a> for a celebrity, brand, or business.</p>
      </div>
    </div>
  </div>
  <footer>
    <p>Meta-clone © 2026</p>
    </footer>
</body>
</html>
